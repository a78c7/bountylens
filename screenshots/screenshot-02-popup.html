<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>BountyLens Popup Mock</title>
    <style>
      * { box-sizing: border-box; }
      body {
        margin: 0;
        display: grid;
        place-items: center;
        min-height: 100vh;
        color: #1f2328;
        background: linear-gradient(135deg, #edf6f0, #f7f8fb);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .frame {
        width: 1280px;
        height: 720px;
        display: grid;
        place-items: center;
      }
      .popup {
        width: 380px;
        padding: 22px;
        border: 1px solid #d0d7de;
        border-radius: 10px;
        background: #ffffff;
        box-shadow: 0 28px 70px rgba(31, 35, 40, 0.18);
      }
      .mark {
        display: grid;
        place-items: center;
        width: 42px;
        height: 42px;
        margin-bottom: 14px;
        border-radius: 9px;
        color: #ffffff;
        background: #1f883d;
        font-weight: 900;
      }
      h1 {
        margin: 0;
        font-size: 28px;
        letter-spacing: 0;
      }
      .tagline {
        margin: 6px 0 18px;
        color: #57606a;
        font-weight: 700;
      }
      .principles {
        margin: 0 0 18px;
        padding: 14px 16px;
        border-radius: 8px;
        background: #f6f8fa;
      }
      .principles p {
        margin: 0 0 8px;
        font-weight: 800;
      }
      ul {
        margin: 0;
        padding-left: 18px;
        color: #57606a;
        line-height: 1.65;
      }
      .button {
        display: block;
        width: 100%;
        margin-top: 10px;
        padding: 12px 14px;
        border-radius: 8px;
        border: 1px solid #1f883d;
        background: #1f883d;
        color: #ffffff;
        text-align: center;
        font-weight: 900;
      }
      .button.secondary {
        border-color: #d0d7de;
        background: #ffffff;
        color: #24292f;
      }
      .version {
        margin-top: 16px;
        color: #6e7781;
        font-size: 12px;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <div class="frame">
      <div class="popup">
        <div class="mark">BL</div>
        <h1>BountyLens</h1>
        <p class="tagline">Safety-first bounty triage</p>
        <div class="principles">
          <p>Local-only safety principles</p>
          <ul>
            <li>Visible GitHub issue text only</li>
            <li>No tokens, cookies, tracking, or server</li>
            <li>No automatic claim, comment, or PR</li>
          </ul>
        </div>
        <div class="button">Copy Codex review prompt</div>
        <div class="button secondary">Open docs</div>
        <div class="button secondary">Run CLI</div>
        <div class="version">Version 0.1.0</div>
      </div>
    </div>
  </body>
</html>
